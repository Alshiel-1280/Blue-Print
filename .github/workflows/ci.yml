name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build debug
        run: swift build
      - name: Build release
        run: swift build -c release
      - name: Test
        run: swift test --parallel
      - name: Swift format lint
        run: swift format lint --recursive --strict Sources Tests Package.swift
      - name: Static package validation
        run: swift package describe
